<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>XR Portal Control</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background-color: #09090b;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      .card {
        padding: 30px;
        background: rgba(24, 24, 27, 0.8);
        border: 1px solid #3f3f46;
        border-radius: 20px;
        width: 320px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        backdrop-filter: blur(12px);
        text-align: center;
      }
      h1 { margin: 0 0 10px 0; font-size: 24px; color: #6366f1; }
      p { margin: 0 0 25px 0; color: #a1a1aa; font-size: 14px; }
      input {
        width: 100%;
        padding: 14px;
        background: #09090b;
        border: 1px solid #27272a;
        border-radius: 10px;
        color: white;
        font-size: 16px;
        margin-bottom: 20px;
        box-sizing: border-box;
        outline: none;
      }
      input:focus { border-color: #6366f1; }
      button {
        width: 100%;
        padding: 14px;
        background: #6366f1;
        border: none;
        border-radius: 10px;
        color: white;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        transition: transform 0.1s, background 0.2s;
      }
      button:hover { background: #4f46e5; }
      button:active { transform: scale(0.98); }
      .status { margin-top: 20px; font-size: 12px; color: #71717a; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>XR Portal</h1>
      <p>Enter a message to spawn it in the immersive workspace.</p>
      
      <input type="text" id="xr-input" placeholder="What's on your mind?" autofocus>
      <button id="send-btn">Transmit to Space</button>
      
      <div class="status">Connected via BroadcastChannel</div>
    </div>

    <script>
      const channel = new BroadcastChannel('xr-portal');
      const input = document.getElementById('xr-input');
      const btn = document.getElementById('send-btn');

      const send = () => {
        const text = input.value.trim();
        if (text) {
          channel.postMessage({ type: 'SPAWN_MESSAGE', text });
          input.value = '';
          btn.textContent = 'Transmitted!';
          btn.style.background = '#10b981';
          setTimeout(() => {
            btn.textContent = 'Transmit to Space';
            btn.style.background = '#6366f1';
          }, 1500);
        }
      };

      btn.addEventListener('click', send);
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') send();
      });
    </script>
  </body>
</html>
