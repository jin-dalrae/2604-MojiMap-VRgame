<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>XR Portal — Grid Planner</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #f8f9fb;
        --surface: #ffffff;
        --surface2: #f0f1f3;
        --border: #e2e4e9;
        --border2: #c9ccd2;
        --accent: #6366f1;
        --accent-dim: rgba(99,102,241,0.10);
        --accent-hover: #4f46e5;
        --text: #1a1a2e;
        --muted: #71717a;
        --cell-bg: #ffffff;
        --cell-alt: #f5f6f8;
        --cell-border: #e2e4e9;
        --cell-size: 48px;
        --success: #10b981;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        height: 100vh;
        display: grid;
        grid-template-rows: 48px 1fr 36px;
        overflow: hidden;
      }

      /* ── Header ── */
      header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      header h1 {
        font-size: 14px;
        font-weight: 600;
        color: var(--accent);
        letter-spacing: 0.02em;
      }

      .header-actions { display: flex; gap: 8px; align-items: center; }

      .btn {
        padding: 6px 14px;
        border: none;
        border-radius: 7px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, transform 0.1s;
      }
      .btn:active { transform: scale(0.97); }
      .btn-primary { background: var(--accent); color: white; }
      .btn-primary:hover { background: var(--accent-hover); }
      .btn-ghost {
        background: var(--surface2);
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover { color: var(--text); border-color: var(--border2); }

      /* ── Main layout ── */
      main {
        display: grid;
        grid-template-columns: 180px 1fr;
        overflow: hidden;
      }

      /* ── Palette ── */
      .palette {
        background: var(--surface);
        border-right: 1px solid var(--border);
        overflow-y: auto;
        padding: 10px 8px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .palette::-webkit-scrollbar { width: 4px; }
      .palette::-webkit-scrollbar-track { background: transparent; }
      .palette::-webkit-scrollbar-thumb { background: #c9ccd2; border-radius: 2px; }

      .palette-section { font-size: 10px; color: var(--muted); text-transform: uppercase;
        letter-spacing: 0.1em; padding: 8px 6px 4px; }
      .palette-section:first-child { padding-top: 2px; }

      .item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 8px;
        border-radius: 7px;
        border: 1px solid transparent;
        cursor: grab;
        user-select: none;
        transition: background 0.1s, border-color 0.1s;
        font-size: 12px;
        color: #3f3f46;
      }
      .item:hover { background: var(--surface2); border-color: var(--border); }
      .item:active { cursor: grabbing; }
      .item.dragging-active { opacity: 0.4; }
      .item-icon { font-size: 17px; flex-shrink: 0; }

      /* ── Grid area ── */
      .grid-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: auto;
        padding: 20px;
        gap: 12px;
        position: relative;
      }

      .grid-meta {
        display: flex;
        align-items: center;
        gap: 12px;
        align-self: flex-start;
        font-size: 11px;
        color: var(--muted);
        margin-left: 2px;
      }

      .view-hint { color: var(--border2); font-size: 10px; }

      /* Grid board */
      .grid-board {
        position: relative;
        background: #f0f1f3;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
      }

      /* Compass labels */
      .compass {
        position: absolute;
        font-size: 9px;
        color: #b0b3ba;
        font-weight: 500;
        letter-spacing: 0.05em;
        pointer-events: none;
      }
      .compass-n { top: -16px; left: 50%; transform: translateX(-50%); }
      .compass-s { bottom: -16px; left: 50%; transform: translateX(-50%); }
      .compass-w { left: -18px; top: 50%; transform: translateY(-50%); }
      .compass-e { right: -18px; top: 50%; transform: translateY(-50%); }

      .grid {
        display: grid;
        grid-template-columns: repeat(10, var(--cell-size));
        grid-template-rows: repeat(10, var(--cell-size));
        gap: 2px;
      }

      .cell {
        width: var(--cell-size);
        height: var(--cell-size);
        background: var(--cell-bg);
        border: 1px solid var(--cell-border);
        border-radius: 3px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        position: relative;
        transition: background 0.08s, border-color 0.08s;
        cursor: default;
      }

      /* Checkerboard tint */
      .cell.alt { background: var(--cell-alt); }

      .cell.drag-over {
        border-color: var(--accent) !important;
        background: var(--accent-dim) !important;
      }

      .cell.occupied { cursor: grab; }
      .cell.occupied:active { cursor: grabbing; }

      .cell .remove-x {
        display: none;
        position: absolute;
        top: -5px;
        right: -5px;
        width: 14px;
        height: 14px;
        background: #ef4444;
        border-radius: 50%;
        font-size: 9px;
        align-items: center;
        justify-content: center;
        color: white;
        cursor: pointer;
        z-index: 2;
        line-height: 1;
        font-weight: 700;
      }

      .cell:hover .remove-x { display: flex; }

      /* Drop zone highlight on drag entering grid */
      .grid.accepting .cell:not(.occupied):hover {
        background: var(--accent-dim);
        border-color: var(--border2);
      }

      /* ── Footer ── */
      footer {
        background: var(--surface);
        border-top: 1px solid var(--border);
        padding: 0 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 11px;
        color: var(--muted);
      }

      .status-dot {
        display: inline-block;
        width: 5px; height: 5px;
        background: var(--success);
        border-radius: 50%;
        margin-right: 5px;
        vertical-align: middle;
      }

      /* ── Player marker ── */
      .player-marker {
        position: absolute;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: radial-gradient(circle, #6366f1 30%, rgba(99,102,241,0.3) 70%);
        border: 2px solid #6366f1;
        z-index: 10;
        pointer-events: none;
        transform: translate(-50%, -50%);
        transition: left 0.15s ease-out, top 0.15s ease-out;
        box-shadow: 0 0 12px rgba(99,102,241,0.5);
      }
      .player-marker::after {
        content: '';
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        border: 2px solid rgba(99,102,241,0.4);
        animation: player-ping 1.5s ease-out infinite;
      }
      .player-marker .player-label {
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 9px;
        font-weight: 700;
        color: #6366f1;
        white-space: nowrap;
        letter-spacing: 0.04em;
        text-shadow: 0 1px 3px rgba(255,255,255,0.8);
      }
      .player-marker .player-arrow {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-left: 4px solid transparent;
        border-right: 4px solid transparent;
        border-bottom: 8px solid #6366f1;
        transform-origin: center 4px;
        transform: translate(-50%, -50%);
        transition: transform 0.15s ease-out;
      }
      @keyframes player-ping {
        0% { transform: scale(1); opacity: 0.6; }
        100% { transform: scale(2); opacity: 0; }
      }
      .player-offline .player-marker {
        opacity: 0.25;
        filter: grayscale(1);
      }
      .player-offline .player-marker::after { animation: none; }

      /* ── 3D view ── */
      .grid-area { perspective: 1200px; }

      .grid-board {
        transform-style: preserve-3d;
        transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .view-3d .grid-board {
        transform: rotateX(55deg) rotateZ(-10deg) scale(0.85);
      }

      .view-3d .cell {
        transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.08s, border-color 0.08s;
        transform-style: preserve-3d;
      }

      .view-3d .cell.occupied {
        transform: translateZ(18px);
        box-shadow: 0 8px 16px rgba(0,0,0,0.12);
      }

      .view-3d .player-marker {
        transform: translate(-50%, -50%) translateZ(24px);
      }

      .view-3d .compass { display: none; }

      /* ── View toggle btn ── */
      .btn-view {
        background: var(--surface2);
        color: var(--muted);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .btn-view:hover { color: var(--text); border-color: var(--border2); }
      .btn-view .view-icon { font-size: 14px; }

      /* ── Custom drag image ── */
      #drag-ghost {
        position: fixed;
        pointer-events: none;
        font-size: 26px;
        z-index: 9999;
        transform: translate(-50%, -50%);
        opacity: 0.85;
        display: none;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>⬡ XR Grid Planner</h1>
      <div class="header-actions">
        <button class="btn btn-view" id="view-toggle"><span class="view-icon">🧊</span> 3D</button>
        <button class="btn btn-ghost" id="clear-btn">Clear All</button>
        <button class="btn btn-primary" id="transmit-btn">Transmit to Space</button>
      </div>
    </header>

    <main>
      <!-- Item palette -->
      <div class="palette" id="palette">
        <div class="palette-section">Primitives</div>
        <div class="item" draggable="true" data-type="cube"     data-icon="🟦" data-label="Cube">     <span class="item-icon">🟦</span>Cube</div>
        <div class="item" draggable="true" data-type="sphere"   data-icon="🔵" data-label="Sphere">   <span class="item-icon">🔵</span>Sphere</div>
        <div class="item" draggable="true" data-type="cylinder" data-icon="🟤" data-label="Cylinder"> <span class="item-icon">🟤</span>Cylinder</div>

        <div class="palette-section">Furniture</div>
        <div class="item" draggable="true" data-type="chair"    data-icon="🪑" data-label="Chair">    <span class="item-icon">🪑</span>Chair</div>

        <div class="palette-section">Enemy</div>
        <div class="item" draggable="true" data-type="ghost"    data-icon="👻" data-label="Ghost">    <span class="item-icon">👻</span>Ghost</div>
        <div class="item" draggable="true" data-type="bird"     data-icon="🦅" data-label="Bird">     <span class="item-icon">🦅</span>Bird</div>
        <div class="item" draggable="true" data-type="snowman"  data-icon="⛄️" data-label="Snowman">  <span class="item-icon">⛄️</span>Snowman</div>

        <div class="palette-section">Weapon</div>
        <div class="item" draggable="true" data-type="hammer"   data-icon="🔨" data-label="Hammer">   <span class="item-icon">🔨</span>Hammer</div>
        <div class="item" draggable="true" data-type="gun"      data-icon="🔫" data-label="Gun">      <span class="item-icon">🔫</span>Gun</div>
      </div>

      <!-- Grid area -->
      <div class="grid-area">
        <div class="grid-meta">
          <span id="view-label">Birds Eye · 10×10</span>
          <span class="view-hint">drag items onto grid · click × to remove · drag to reposition</span>
        </div>

        <div class="grid-board">
          <span class="compass compass-n">N</span>
          <span class="compass compass-s">S</span>
          <span class="compass compass-w">W</span>
          <span class="compass compass-e">E</span>
          <div class="grid" id="grid"></div>
          <div class="player-marker" id="player-marker" style="display:none;">
            <span class="player-label">QUEST</span>
            <span class="player-arrow"></span>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <span><span class="status-dot"></span>BroadcastChannel connected</span>
      <span id="item-count">0 items placed</span>
    </footer>

    <div id="drag-ghost"></div>

    <script>
      const COLS = 10, ROWS = 10;
      const gridEl = document.getElementById('grid');
      const ghost  = document.getElementById('drag-ghost');
      const channel = new BroadcastChannel('xr-portal');

      // Grid state: flat map "r,c" -> {type, icon, label}
      const state = new Map();

      let dragging = null;           // item being dragged
      let fromCell = null;           // "r,c" key if source is a grid cell

      // ── Build grid ──────────────────────────────────────────
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell' + ((r + c) % 2 === 1 ? ' alt' : '');
          cell.dataset.r = r;
          cell.dataset.c = c;

          cell.addEventListener('dragover', onCellDragOver);
          cell.addEventListener('dragleave', onCellDragLeave);
          cell.addEventListener('drop', onCellDrop);

          gridEl.appendChild(cell);
        }
      }

      // ── Palette drag start ───────────────────────────────────
      document.querySelectorAll('.item').forEach(el => {
        el.addEventListener('dragstart', (e) => {
          dragging = { type: el.dataset.type, icon: el.dataset.icon, label: el.dataset.label };
          fromCell = null;
          el.classList.add('dragging-active');
          gridEl.classList.add('accepting');
          showGhost(el.dataset.icon, e);
          e.dataTransfer.effectAllowed = 'copy';
          e.dataTransfer.setDragImage(new Image(), 0, 0); // hide native ghost
        });
        el.addEventListener('dragend', () => {
          el.classList.remove('dragging-active');
          endDrag();
        });
      });

      // ── Ghost follow cursor ──────────────────────────────────
      function showGhost(icon, e) {
        ghost.textContent = icon;
        ghost.style.display = 'block';
        moveGhost(e);
      }

      document.addEventListener('dragover', (e) => {
        e.preventDefault();
        moveGhost(e);
      });

      function moveGhost(e) {
        ghost.style.left = e.clientX + 'px';
        ghost.style.top  = e.clientY + 'px';
      }

      function endDrag() {
        ghost.style.display = 'none';
        gridEl.classList.remove('accepting');
        dragging = null;
        fromCell = null;
      }

      // ── Cell drag events ─────────────────────────────────────
      function onCellDragOver(e) {
        e.preventDefault();
        this.classList.add('drag-over');
        e.dataTransfer.dropEffect = fromCell ? 'move' : 'copy';
      }

      function onCellDragLeave() {
        this.classList.remove('drag-over');
      }

      function onCellDrop(e) {
        e.preventDefault();
        this.classList.remove('drag-over');
        if (!dragging) return;

        const r = parseInt(this.dataset.r);
        const c = parseInt(this.dataset.c);
        const key = `${r},${c}`;

        // If moving from another cell, clear it first
        if (fromCell && fromCell !== key) {
          clearCell(fromCell);
        }

        placeItem(key, dragging);
        endDrag();
      }

      // ── Cell content drag (reposition) ──────────────────────
      function makeCellDraggable(key) {
        const cell = getCell(key);
        cell.setAttribute('draggable', 'true');
        cell._dragStart = (e) => {
          dragging = state.get(key);
          fromCell = key;
          gridEl.classList.add('accepting');
          showGhost(dragging.icon, e);
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setDragImage(new Image(), 0, 0);
        };
        cell._dragEnd = () => endDrag();
        cell.addEventListener('dragstart', cell._dragStart);
        cell.addEventListener('dragend', cell._dragEnd);
      }

      // ── Place / clear helpers ────────────────────────────────
      function placeItem(key, item) {
        clearCell(key); // ensure clean slot
        state.set(key, item);

        const cell = getCell(key);
        cell.classList.add('occupied');

        const icon = document.createElement('span');
        icon.textContent = item.icon;
        icon.title = item.label;

        const x = document.createElement('div');
        x.className = 'remove-x';
        x.textContent = '×';
        x.addEventListener('click', (e) => { e.stopPropagation(); clearCell(key); });

        cell.appendChild(icon);
        cell.appendChild(x);
        makeCellDraggable(key);
        updateCount();
      }

      function clearCell(key) {
        if (!state.has(key)) return;
        state.delete(key);

        const cell = getCell(key);
        cell.classList.remove('occupied');
        cell.removeAttribute('draggable');
        if (cell._dragStart) { cell.removeEventListener('dragstart', cell._dragStart); cell._dragStart = null; }
        if (cell._dragEnd)   { cell.removeEventListener('dragend',   cell._dragEnd);   cell._dragEnd = null; }
        cell.innerHTML = '';
        updateCount();
      }

      function getCell(key) {
        const [r, c] = key.split(',');
        return gridEl.querySelector(`[data-r="${r}"][data-c="${c}"]`);
      }

      function updateCount() {
        const n = state.size;
        document.getElementById('item-count').textContent =
          n === 0 ? '0 items placed' : `${n} item${n !== 1 ? 's' : ''} placed`;
      }

      // ── Clear all ────────────────────────────────────────────
      document.getElementById('clear-btn').addEventListener('click', () => {
        for (const key of [...state.keys()]) clearCell(key);
      });

      // ── Transmit ─────────────────────────────────────────────
      document.getElementById('transmit-btn').addEventListener('click', () => {
        const items = [];
        for (const [key, item] of state.entries()) {
          const [row, col] = key.split(',').map(Number);
          items.push({ row, col, ...item });
        }
        channel.postMessage({ type: 'SPAWN_GRID', items });

        const btn = document.getElementById('transmit-btn');
        btn.textContent = 'Transmitted!';
        btn.style.background = '#10b981';
        setTimeout(() => {
          btn.textContent = 'Transmit to Space';
          btn.style.background = '';
        }, 1500);
      });

      // ── Player marker (Quest headset tracking) ──────────────
      const playerMarker = document.getElementById('player-marker');
      const playerArrow  = playerMarker.querySelector('.player-arrow');
      const gridBoard    = document.querySelector('.grid-board');
      const syncChannel  = new BroadcastChannel('xr-sync');

      // World-space bounds that map to the 10x10 grid
      // Grid center = world origin, each cell = 1 meter
      const GRID_WORLD_SIZE = 10; // 10m x 10m area
      const GRID_HALF = GRID_WORLD_SIZE / 2;

      let playerOnline = false;
      let playerTimeout = null;

      syncChannel.onmessage = (event) => {
        const data = event.data;
        if (data.type !== 'SYNC_UPDATES') return;

        const headUpdate = data.updates.find(u => u.id === 'player_head');
        if (!headUpdate) return;

        // Mark player as online
        if (!playerOnline) {
          playerOnline = true;
          playerMarker.style.display = '';
          gridBoard.classList.remove('player-offline');
        }

        // Reset offline timer (3s without data = offline)
        clearTimeout(playerTimeout);
        playerTimeout = setTimeout(() => {
          playerOnline = false;
          gridBoard.classList.add('player-offline');
        }, 3000);

        // Map world XZ -> grid pixel position
        // World X -> grid column (left-right), World Z -> grid row (top-bottom)
        const worldX = headUpdate.pos[0];
        const worldZ = headUpdate.pos[2];

        // Normalize to 0..1 range across the grid
        const normX = (worldX + GRID_HALF) / GRID_WORLD_SIZE;
        const normZ = (worldZ + GRID_HALF) / GRID_WORLD_SIZE;

        // Clamp to grid bounds
        const cx = Math.max(0, Math.min(1, normX));
        const cz = Math.max(0, Math.min(1, normZ));

        // Convert to pixel offset within the grid element
        const gridRect = gridEl.getBoundingClientRect();
        const boardRect = gridBoard.getBoundingClientRect();
        const offsetX = gridEl.offsetLeft + cx * gridEl.offsetWidth;
        const offsetY = gridEl.offsetTop + cz * gridEl.offsetHeight;

        playerMarker.style.left = offsetX + 'px';
        playerMarker.style.top  = offsetY + 'px';

        // Heading from quaternion (yaw around Y axis)
        const qx = headUpdate.rot[0], qy = headUpdate.rot[1];
        const qz = headUpdate.rot[2], qw = headUpdate.rot[3];
        const yaw = Math.atan2(2 * (qw * qy + qx * qz), 1 - 2 * (qy * qy + qz * qz));
        const deg = (-yaw * 180 / Math.PI);
        playerArrow.style.transform = `translate(-50%, -50%) rotate(${deg}deg)`;
      };

      // ── 2D / 3D View Toggle ─────────────────────────────────
      const gridArea   = document.querySelector('.grid-area');
      const viewBtn    = document.getElementById('view-toggle');
      const viewLabel  = document.getElementById('view-label');
      let is3D = false;

      viewBtn.addEventListener('click', () => {
        is3D = !is3D;
        gridArea.classList.toggle('view-3d', is3D);
        viewBtn.innerHTML = is3D
          ? '<span class="view-icon">📐</span> 2D'
          : '<span class="view-icon">🧊</span> 3D';
        viewLabel.textContent = is3D ? 'Isometric · 10×10' : 'Birds Eye · 10×10';
      });
    </script>
  </body>
</html>
