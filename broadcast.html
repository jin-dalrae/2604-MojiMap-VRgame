<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Global Broadcast - Prototyping</title>
    <style>
      body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
      #scene-container { width: 100vw; height: 100vh; }
      #overlay {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(9, 9, 11, 0.8);
        padding: 15px;
        border-radius: 10px;
        border: 1px solid #3f3f46;
        color: white;
        pointer-events: none;
        backdrop-filter: blur(8px);
      }
      .live-indicator {
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #ef4444;
        border-radius: 50%;
        margin-right: 5px;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.3; }
        100% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="scene-container"></div>
    <div id="overlay">
      <div style="font-size: 12px; font-weight: bold; color: #6366f1;">
        <span class="live-indicator"></span> LIVE BROADCAST
      </div>
      <div style="font-size: 10px; color: #a1a1aa; margin-top: 5px;">
        Third-Person View (Auto-Sync)
      </div>
    </div>
    <script type="module" src="/src/broadcast-entry.ts"></script>
  </body>
</html>
