<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Global Broadcast - Prototyping</title>
    <style>
      body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
      #scene-container { width: 100vw; height: 100vh; }
      #overlay {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(9, 9, 11, 0.8);
        padding: 15px;
        border-radius: 10px;
        border: 1px solid #3f3f46;
        color: white;
        pointer-events: none;
        backdrop-filter: blur(8px);
      }
      @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.3; }
        100% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="scene-container"></div>
    <div id="overlay"></div>
    <!-- Same entry script as the VR scene. index.ts detects the
         broadcast path and switches to spectator mode (no XR, orbit
         camera, DOM HUD) so we render exactly what VR clients render
         without duplicating any setup. -->
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
